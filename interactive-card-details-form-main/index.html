<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Card Details Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Skriveni h1 za pristupačnost – ispunjava zahtev za level-one heading -->
  <h1 class="sr-only">Interactive Card Details Form – Unesite podatke o kartici</h1>

  <main class="app-container">
    <section class="left-panel">
      <div class="cards-container">
        <div class="card-front">
          <span class="circle"></span>
          <span class="circle1"></span>
          <p class="card-numer" id="display-number">0000 0000 0000 0000</p>
          <p class="card-name" id="display-name">JANE APPLESEED</p>
          <p class="card-date" id="display-date">00/00</p>
        </div>
        <div class="card-back">
          <p class="card-back-num" id="display-cvc">000</p>
        </div>
      </div>
    </section>

    <section class="right-panel">
      <form id="card-form" class="card-form" novalidate>
        <div class="field-group">
          <label>Cardholder Name</label>
          <input type="text" id="cardholder-name" placeholder="e.g. Felicia Leire" maxlength="30" autocomplete="off">
          <span class="error-text" id="error-name"></span>
        </div>
        
        <div class="field-group">
          <label>Card Number</label>
          <input type="text" id="card-number" placeholder="e.g. 1234 5678 9012 3456" maxlength="19" autocomplete="off">
          <span class="error-text" id="error-number"></span>
        </div>

        <div class="multipart-row">
          <div class="field-group exp-group">
            <label>Exp. Date (MM/YY)</label>
            <div class="dual-inputs">
              <input type="text" id="card-mm" placeholder="MM" maxlength="2" autocomplete="off">
              <input type="text" id="card-yy" placeholder="YY" maxlength="2" autocomplete="off">
            </div>
            <span class="error-text" id="error-date"></span>
          </div>

          <div class="field-group cvc-group">
            <label>CVC</label>
            <input type="text" id="card-cvc" placeholder="e.g. 123" maxlength="3" autocomplete="off">
            <span class="error-text" id="error-cvc"></span>
          </div>
        </div>
        
        <button type="submit" class="action-btn" id="btn-submit">Confirm</button>
      </form>

      <div id="success-view" class="success-view element-hidden">
        <div class="success-icon-badge">✓</div>
        <h1 class="success-heading">Thank you!</h1>
        <p class="success-subtext">We've added your card details</p>
        <button type="button" class="action-btn" id="btn-continue">Continue</button>
      </div>
    </section>
  </main>
  <script src="index.js"></script>
</body>
</html>
